# ============================================================
# API Gateway e Frontend (grupo-5)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: grupo-5
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: vinialves2020/api-gateway:1.0
          imagePullPolicy: Always
          env:
            - name: KEYCLOAK_URL
              value: https://kiriland.unb.br/keycloak
            - name: KEYCLOAK_REALM
              value: grupo05
            - name: KEYCLOAK_CLIENT_ID
              value: admin-cli
            - name: AUTHZ_ADDR
              value: authorization:50051
            - name: PATIENT_ADDR
              value: patient-data:50051
            - name: TRANSFORM_ADDR
              value: data-transform:50051
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests: { cpu: "100m", memory: "192Mi" }
            limits: { cpu: "500m", memory: "384Mi" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: grupo-5
  labels:
    app: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8000
      targetPort: 8000
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: grupo-5
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: vinialves2020/frontend:1.0
          imagePullPolicy: Always
          env:
            - name: DNS_RESOLVER
              value: "10.96.0.10"
            - name: GATEWAY_UPSTREAM
              value: "api-gateway.grupo-5.svc.cluster.local:8000"
          ports:
            - containerPort: 80
              name: http
          resources:
            requests: { cpu: "50m", memory: "32Mi" }
            limits: { cpu: "200m", memory: "64Mi" }
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: grupo-5
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      name: http
