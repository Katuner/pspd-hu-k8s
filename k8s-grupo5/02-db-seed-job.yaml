apiVersion: v1
kind: ConfigMap
metadata:
  name: db-init-scripts
  namespace: grupo-5
data:
  01-schema.sql: |
    CREATE TABLE IF NOT EXISTS patients (
      patient_id VARCHAR(50) PRIMARY KEY,
      full_name VARCHAR(255),
      birth_date DATE,
      gender VARCHAR(20),
      city VARCHAR(100),
      state VARCHAR(50),
      cpf VARCHAR(20),
      cns VARCHAR(20)
    );
    -- Este arquivo será substituído pelo conteúdo real via automação
  02-seed.sql: |
    -- Este arquivo será substituído pelo conteúdo real via automação
---
apiVersion: batch/v1
kind: Job
metadata:
  name: db-seed-job
  namespace: grupo-5
spec:
  template:
    spec:
      containers:
      - name: psql-client
        image: postgres:16-alpine
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: POSTGRES_PASSWORD
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: POSTGRES_USER
        - name: PGDATABASE
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: POSTGRES_DB
        command: ["/bin/sh", "-c"]
        args:
          - "psql -h 192.168.122.1 -f /scripts/01-schema.sql && psql -h 192.168.122.1 -f /scripts/02-seed.sql"
        volumeMounts:
        - name: scripts-volume
          mountPath: /scripts
      restartPolicy: Never
      volumes:
      - name: scripts-volume
        configMap:
          name: db-init-scripts
  backoffLimit: 1
