# ============================================================
# Template de configuração do nginx do frontend.
# É processado pelo entrypoint oficial da imagem nginx (envsubst),
# substituindo ${GATEWAY_UPSTREAM} e ${DNS_RESOLVER} por variáveis
# de ambiente definidas no docker-compose / manifest K8S.
#
# Por que assim? Na primeira versão usávamos "proxy_pass
# http://api-gateway:8000/" fixo; o nginx tenta resolver o nome na
# INICIALIZAÇÃO e aborta com "host not found in upstream" se o
# gateway ainda não estiver registrado no DNS (erro observado na
# validação). Com variável + resolver, a resolução passa a ocorrer
# em tempo de requisição, tornando o frontend resiliente à ordem
# de subida dos serviços.
# ============================================================
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # config.js opcional (pode sobrescrever GATEWAY_URL no navegador)
    location = /config.js {
        default_type application/javascript;
        return 200 "// gateway acessado via proxy /gw\n";
    }

    # Proxy reverso para a API Gateway (resolução dinâmica de DNS)
    location /gw/ {
        resolver ${DNS_RESOLVER} valid=10s ipv6=off;
        set $gateway_upstream "${GATEWAY_UPSTREAM}";
        rewrite ^/gw/(.*)$ /$1 break;
        proxy_pass http://$gateway_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Métrica simples de status do nginx (observabilidade extra)
    location /nginx_status {
        stub_status;
        allow all;
    }
}
