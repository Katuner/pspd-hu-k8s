# ============================================================
# Horizontal Pod Autoscaler (fase d — autoscaling)
# Requer metrics-server instalado no cluster.
# Escala baseada em CPU: alvo de 60% da CPU requisitada,
# mínimo 1 réplica, máximo 10 réplicas (conforme especificação).
#
# Aplicar somente na fase de autoscaling:
#   kubectl apply -f k8s/40-hpa.yaml
# Remover para voltar ao controle manual de réplicas:
#   kubectl delete -f k8s/40-hpa.yaml
# ============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
  namespace: hospital
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30    # reage rápido a picos
      policies:
        - type: Pods
          value: 4
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120   # evita "flapping" ao reduzir
---
