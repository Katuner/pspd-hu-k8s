            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: patient-data
  namespace: hospital
  labels:
    app: patient-data
spec:
  selector:
    app: patient-data
  ports:
    - port: 50051
      targetPort: 50051
