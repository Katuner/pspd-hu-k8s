# ============================================================
# Microsserviços gRPC: authorization, patient-data, data-transform
# Cada Deployment começa com 1 réplica (fase a — validação funcional).
# Requests/limits de CPU definidos para permitir o cálculo do HPA.
# ============================================================

# ---------------------- Authorization Service ----------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authorization
  namespace: hospital
  labels:
    app: authorization
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authorization
  template:
    metadata:
      labels:
        app: authorization
    spec:
      containers:
        - name: authorization
          image: hospital/authorization:1.0
          imagePullPolicy: IfNotPresent   # imagem carregada via kind load
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_NAME
              valueFrom: { secretKeyRef: { name: db-credentials, key: POSTGRES_DB } }
            - name: DB_USER
              valueFrom: { secretKeyRef: { name: db-credentials, key: POSTGRES_USER } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: db-credentials, key: POSTGRES_PASSWORD } }
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 9100
              name: metrics
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
          readinessProbe:
            tcpSocket: { port: 50051 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: authorization
  namespace: hospital
  labels:
    app: authorization
spec:
  selector:
    app: authorization
  ports:
    - port: 50051
      targetPort: 50051
      name: grpc
    - port: 9100
      targetPort: 9100
      name: metrics
---
# ---------------------- Patient Data Service ----------------------
apiVersion: apps/v1
kind: Deployment
metadata:
