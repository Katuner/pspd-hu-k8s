  namespace: hospital
  labels:
    app: patient-data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient-data
  template:
    metadata:
      labels:
        app: patient-data
    spec:
      containers:
        - name: patient-data
          image: hospital/patient-data:1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_NAME
              valueFrom: { secretKeyRef: { name: db-credentials, key: POSTGRES_DB } }
            - name: DB_USER
              valueFrom: { secretKeyRef: { name: db-credentials, key: POSTGRES_USER } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: db-credentials, key: POSTGRES_PASSWORD } }
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 9100
              name: metrics
          resources:
