# ============================================================
# PostgreSQL — 1 instância (StatefulSet) conforme fase (a)
# Os scripts SQL de schema/seed são entregues via ConfigMap
# criado pelo script deploy-all.sh:
#   kubectl -n hospital create configmap db-init \
#     --from-file=database/01-schema.sql --from-file=database/02-seed.sql
# ============================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: hospital
  labels:
    app: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: pg
          envFrom:
            - secretRef:
                name: db-credentials
          # Ajustes para suportar mais conexões durante os testes de carga
          args: ["-c", "max_connections=300", "-c", "shared_buffers=256MB"]
          volumeMounts:
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "hospital"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: init-scripts
          configMap:
            name: db-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: hospital
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: pg
  clusterIP: None   # headless: StatefulSet
---
# Exporter de métricas do PostgreSQL para o Prometheus (observabilidade do banco)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: hospital
  labels:
    app: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
        - name: exporter
          image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
          env:
            - name: DATA_SOURCE_NAME
              value: "postgresql://hospital:hospital123@postgres:5432/hospital?sslmode=disable"
          ports:
            - containerPort: 9187
              name: metrics
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "200m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: hospital
  labels:
    app: postgres-exporter
spec:
  selector:
    app: postgres-exporter
  ports:
    - port: 9187
      targetPort: 9187
      name: metrics
