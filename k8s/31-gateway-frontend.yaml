# ============================================================
# API Gateway (REST -> gRPC) e Frontend (nginx)
# Ambos expostos via NodePort para acesso externo:
#   frontend:    http://localhost:30080
#   api-gateway: http://localhost:30800
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: hospital
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: hospital/api-gateway:1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: KEYCLOAK_URL
              value: http://keycloak:8080
            - name: KEYCLOAK_REALM
              value: hospital
            - name: KEYCLOAK_CLIENT_ID
              value: hospital-frontend
            - name: AUTHZ_ADDR
              value: authorization:50051
            - name: PATIENT_ADDR
              value: patient-data:50051
            - name: TRANSFORM_ADDR
              value: data-transform:50051
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests: { cpu: "200m", memory: "192Mi" }
            limits: { cpu: "1", memory: "384Mi" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: hospital
  labels:
    app: api-gateway
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30800
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: hospital
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: hospital/frontend:1.0
          imagePullPolicy: IfNotPresent
          env:
            # DNS interno do cluster (ClusterIP padrão do kube-dns no kind)
            - name: DNS_RESOLVER
              value: "10.96.0.10"
            - name: GATEWAY_UPSTREAM
              value: "api-gateway.hospital.svc.cluster.local:8000"
          ports:
            - containerPort: 80
              name: http
          resources:
            requests: { cpu: "50m", memory: "32Mi" }
            limits: { cpu: "200m", memory: "64Mi" }
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: hospital
  labels:
    app: frontend
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
      name: http
